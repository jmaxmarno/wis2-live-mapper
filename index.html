<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIS2 Live Mapper</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100">
    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 px-4 py-3">
        <div class="flex items-center justify-between">
            <h1 class="text-xl font-bold">WIS2 Live Mapper</h1>
            <div class="flex items-center gap-4">
                <div id="connection-status" class="flex items-center gap-2">
                    <span class="status-indicator disconnected"></span>
                    <span id="status-text">Disconnected</span>
                </div>
                <button id="config-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded">
                    Configure
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex h-[calc(100vh-60px)]">
        <!-- Statistics Panel -->
        <aside id="stats-panel" class="w-80 bg-gray-800 border-r border-gray-700 overflow-y-auto">
            <div class="p-4">
                <h2 class="text-lg font-semibold mb-4">Statistics</h2>

                <!-- Summary Stats -->
                <div class="mb-4 p-3 bg-gray-700 rounded">
                    <div class="flex justify-between mb-2">
                        <span>Total Messages:</span>
                        <span id="total-messages" class="font-bold">0</span>
                    </div>
                    <div class="flex justify-between mb-2">
                        <span>Messages/sec:</span>
                        <span id="messages-per-second" class="font-bold">0.0</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Visible Markers:</span>
                        <span id="visible-markers" class="font-bold">0</span>
                    </div>
                </div>

                <!-- Topic Tree -->
                <div id="topic-tree" class="space-y-1">
                    <!-- Topic hierarchy will be dynamically inserted here -->
                </div>

                <button id="clear-map-btn" class="w-full mt-4 px-4 py-2 bg-red-600 hover:bg-red-700 rounded">
                    Clear Map
                </button>
            </div>
        </aside>

        <!-- Map Container -->
        <main class="flex-1 relative">
            <div id="map" class="w-full h-full"></div>

            <!-- Map Controls Overlay -->
            <div class="absolute bottom-4 left-4 bg-gray-800 bg-opacity-90 rounded p-2 text-sm">
                <div id="map-info">
                    <div>Messages: <span id="map-message-count">0</span></div>
                    <div>Shown: <span id="map-shown-count">0</span></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Configuration Modal -->
    <div id="config-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg shadow-xl w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Configuration</h2>
                <button id="close-config-btn" class="text-gray-400 hover:text-gray-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <form id="config-form" class="space-y-4">
                <!-- Broker Selection -->
                <div>
                    <label class="block text-sm font-medium mb-2">Global Broker</label>
                    <select id="broker-select" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2">
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>

                <!-- Protocol Selection -->
                <div>
                    <label class="block text-sm font-medium mb-2">Connection Protocol</label>
                    <div id="protocol-options" class="space-y-2">
                        <!-- Radio buttons will be populated dynamically -->
                    </div>
                </div>

                <!-- Topics -->
                <div>
                    <label class="block text-sm font-medium mb-2">Topics to Subscribe</label>
                    <div id="topic-checkboxes" class="space-y-2">
                        <!-- Checkboxes will be populated dynamically -->
                    </div>
                </div>

                <!-- Display Settings -->
                <div>
                    <label class="block text-sm font-medium mb-2">Max Markers</label>
                    <input type="number" id="max-messages" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2" min="100" max="5000" step="100">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Fade Duration (seconds)</label>
                    <input type="number" id="fade-duration" class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2" min="5" max="300" step="5">
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-2 mt-6">
                    <button type="button" id="connect-btn" class="flex-1 px-4 py-2 bg-green-600 hover:bg-green-700 rounded">
                        Connect
                    </button>
                    <button type="button" id="disconnect-btn" class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 rounded">
                        Disconnect
                    </button>
                </div>
            </form>

            <div id="connection-info" class="mt-4 p-3 bg-gray-700 rounded text-sm hidden">
                <div class="font-medium mb-1">Connection Details</div>
                <div id="connection-details" class="text-xs text-gray-300"></div>
            </div>
        </div>
    </div>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- MQTT.js -->
    <script src="https://unpkg.com/mqtt@5.3.5/dist/mqtt.min.js"></script>

    <!-- Application Scripts -->
    <script src="js/config-manager.js"></script>
    <script src="js/message-parser.js"></script>
    <script src="js/mqtt-client.js"></script>
    <script src="js/map-viewer.js"></script>
    <script src="js/stats-panel.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
